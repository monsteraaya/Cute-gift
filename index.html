<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Protocol | MONSTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff2e63;
            --accent: #ffd700;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10; padding: 15px;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }

        .glass-box {
            background: var(--glass);
            padding: 30px 20px; border-radius: 25px;
            border: 1px solid rgba(255, 46, 99, 0.2);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 90%; max-width: 320px;
        }

        /* Keypad Styles */
        .display {
            background: #000; border-radius: 12px;
            padding: 12px; margin-bottom: 20px;
            font-size: 1.8rem; color: var(--primary);
            letter-spacing: 5px; min-height: 40px;
            border: 1px solid #222;
        }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key {
            padding: 15px; background: #111;
            border-radius: 15px; cursor: pointer;
            font-weight: bold; border: 1px solid #222;
        }
        .key:active { background: var(--primary); color: #000; }

        /* Reveal Styles */
        .neon-name {
            font-size: 3rem; font-weight: 900; margin: 10px 0;
            text-transform: uppercase; color: #fff;
            text-shadow: 0 0 20px var(--primary);
            word-wrap: break-word; text-align: center;
        }

        .msg-btn {
            background: var(--primary); color: #000;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin-top: 20px; border: none;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.4);
        }

        /* FIXED: Scrollable Letter Modal */
        .letter-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; color: #000; 
            padding: 25px; border-radius: 25px;
            width: 85%; max-width: 310px; 
            max-height: 70vh; /* Screen ka 70% height max */
            z-index: 100; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 100px rgba(255,46,99,0.5);
            display: flex; flex-direction: column;
        }
        .letter-modal.open { transform: translate(-50%, -50%) scale(1); }
        
        .scroll-area {
            overflow-y: auto; /* Scroll enabled here */
            padding-right: 5px;
            text-align: left;
            font-size: 0.95rem; line-height: 1.6;
        }
        /* Custom scrollbar for style */
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        /* Setup Screen */
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #333;
            background: #000; color: white; box-sizing: border-box;
            font-size: 0.9rem;
        }

        .watermark { position: fixed; bottom: 10px; right: 15px; color: var(--primary); font-size: 10px; font-weight: bold; opacity: 0.5; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="watermark">DEV: MONSTER</div>

    <div id="stage1" class="screen">
        <div class="glass-box">
            <h2 style="color:var(--accent); margin-top:0;">BIRTHDAY LOCK</h2>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 15px;">YEAR (2000-2025)</p>
            <div id="display" class="display"></div>
            <div class="keys">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);
                </script>
                <div class="key" style="color:#555" onclick="clr()">C</div>
                <div class="key" onclick="press(0)">0</div>
                <div class="key" style="background:var(--primary); color:black;" onclick="verify()">OK</div>
            </div>
        </div>
    </div>

    <div id="stage2" class="screen hidden">
        <div style="font-size: 60px;">🎁</div>
        <h1 id="targetName" class="neon-name"></h1>
        <p style="color:var(--accent); font-weight:bold; letter-spacing:3px; font-size:0.8rem;">HAPPY BIRTHDAY!</p>
        <button class="msg-btn" onclick="toggleLetter()">READ MESSAGE ✉️</button>
        
        <div id="letter" class="letter-modal">
            <h3 style="color: var(--primary); margin: 0 0 15px 0; text-align:center;">For You 💖</h3>
            <div class="scroll-area">
                <p id="finalMsg"></p>
            </div>
            <button onclick="toggleLetter()" style="margin-top:15px; background:#f0f0f0; border:none; padding:8px; border-radius:10px; width:100%; cursor:pointer; font-weight:bold;">Close</button>
        </div>
    </div>

    <div id="setup" class="screen hidden">
        <div class="glass-box">
            <h3 style="margin-top:0;">Create Surprise</h3>
            <input type="text" id="nameInp" placeholder="Friend's Name">
            <textarea id="msgInp" placeholder="Enter long message here... (No limits)"></textarea>
            <button onclick="genLink()" style="width:100%; background:var(--primary); padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">GENERATE LINK</button>
        </div>
    </div>

    <script>
        let input = "";
        const params = new URLSearchParams(window.location.search);
        const u = params.get('u'); 
        const x = params.get('x'); 

        window.onload = () => {
            if (!u) {
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('setup').classList.remove('hidden');
            }
        };

        function press(n) { if(input.length < 4) { input += n; document.getElementById('display').innerText = input; } }
        function clr() { input = ""; document.getElementById('display').innerText = ""; }

        function verify() {
            const year = parseInt(input);
            if (year >= 2000 && year <= 2025) { unlock(); } 
            else { alert("Incorrect Year!"); clr(); }
        }

        function unlock() {
            document.getElementById('stage1').classList.add('hidden');
            document.getElementById('stage2').classList.remove('hidden');
            document.getElementById('targetName').innerText = decodeURIComponent(u);
            if(x) {
                // Secure Decode: URL Safe Base64
                try {
                    const decoded = atob(x.replace(/-/g, '+').replace(/_/g, '/').split("").reverse().join(""));
                    document.getElementById('finalMsg').innerText = decodeURIComponent(escape(decoded));
                } catch(e) { document.getElementById('finalMsg').innerText = "Message Corrupted!"; }
            }
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function toggleLetter() { document.getElementById('letter').classList.toggle('open'); }

        function genLink() {
            const n = document.getElementById('nameInp').value;
            const m = document.getElementById('msgInp').value;
            if(!n || !m) return alert("Details bhariye!");

            // Encode + Reverse + URL Safe (To prevent preview leakage)
            let secret = btoa(unescape(encodeURIComponent(m))).split("").reverse().join("");
            secret = secret.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            
            const link = `${window.location.origin}${window.location.pathname}?u=${encodeURIComponent(n)}&x=${secret}`;
            
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ PRO LINK COPIED!\nMessage is fully hidden and scrollable.");
                window.location.href = link;
            });
        }

        // Bg Hearts
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let hearts = [];
        for(let i=0; i<30; i++) hearts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1+0.5, sz: Math.random()*10+5});
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 46, 99, 0.2)";
            hearts.forEach(h => {
                ctx.font = h.sz+"px serif"; ctx.fillText('❤️', h.x, h.y);
                h.y -= h.s; if(h.y < -20) h.y = canvas.height+20;
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
