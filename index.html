<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You | MONSTER</title>
    <style>
        /* CSS START */
        body {
            margin: 0; padding: 0;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white;
        }

        /* Floating Hearts Layer */
        .bg-hearts {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .container { text-align: center; z-index: 10; width: 90%; max-width: 450px; }
        .hidden { display: none !important; }

        /* Step 1: Input Box Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px; border-radius: 25px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 20px; color: #ff2e63; }

        input {
            width: 85%; padding: 15px; margin: 20px 0;
            border-radius: 50px; border: 1px solid #ff2e63; outline: none;
            text-align: center; font-size: 1.1rem; background: transparent; color: white;
        }

        button {
            background: #ff2e63; color: white;
            padding: 12px 35px; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 46, 99, 0.4);
        }

        button:hover { transform: scale(1.05); background: #ff4d7d; }

        /* Step 2: Surprise Visuals (The Heart) */
        .heart-main {
            position: relative; width: 100px; height: 90px;
            background-color: #ff2e63; margin: 0 auto 50px;
            transform: rotate(-45deg);
            animation: pulse 0.7s infinite alternate;
            box-shadow: 0 0 50px rgba(255, 46, 99, 0.8);
        }

        .heart-main::before, .heart-main::after {
            content: ''; position: absolute; width: 100px; height: 100px;
            background-color: #ff2e63; border-radius: 50%;
        }

        .heart-main::before { top: -50px; left: 0; }
        .heart-main::after { top: 0; left: 50px; }

        @keyframes pulse {
            to { transform: scale(1.3) rotate(-45deg); }
        }

        .special-name {
            font-size: 3.5rem; font-weight: bold;
            margin-top: 60px; text-shadow: 0 0 25px #ff2e63;
            letter-spacing: 3px;
        }

        .message { font-size: 1.3rem; opacity: 0.9; margin-top: 15px; font-style: italic; }

        /* Branding Watermark */
        .watermark {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 0.75rem; letter-spacing: 3px; color: #ff2e63;
            font-weight: bold; opacity: 0.7; z-index: 100;
        }

        /* Particle Logic */
        .particle {
            position: absolute; color: #ff2e63;
            animation: float Up 5s linear infinite;
            z-index: 2;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-hearts" id="bg-hearts"></div>

    <div id="form-side" class="container">
        <div class="glass-card">
            <h1>CREATE GIFT</h1>
            <input type="text" id="nameInput" placeholder="Enter Their Name..." spellcheck="false">
            <br>
            <button onclick="makeLink()">Generate & Copy Link</button>
        </div>
    </div>

    <div id="surprise-side" class="container hidden">
        <div class="heart-main"></div>
        <h1 class="special-name" id="targetName"></h1>
        <p class="message">You are the most amazing person! ❤️</p>
    </div>

    <div class="watermark">DEV: MONSTER</div>

    <script>
        /* JAVASCRIPT START */

        // 1. Particle Background Logic
        function createHeart() {
            const container = document.getElementById('bg-hearts');
            const heart = document.createElement('div');
            heart.innerHTML = "❤️";
            heart.className = "particle";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.opacity = Math.random();
            container.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 4000);
        }
        setInterval(createHeart, 250);

        // 2. Link & Display Logic
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('gift'); // URL Param
            if (name) {
                showVisual(decodeURIComponent(name));
            }
        };

        function makeLink() {
            const name = document.getElementById('nameInput').value;
            if (!name) return alert("Pehle naam toh enter karein!");

            const base = window.location.href.split('?')[0];
            const link = `${base}?gift=${encodeURIComponent(name)}`;

            // Copy to Clipboard
            navigator.clipboard.writeText(link).then(() => {
                alert("Link Copy Ho Gayi!\nIse send kar dein: " + name);
                window.location.href = link; // Preview
            });
        }

        function showVisual(name) {
            document.getElementById('form-side').classList.add('hidden');
            document.getElementById('surprise-side').classList.remove('hidden');
            document.getElementById('targetName').innerText = name;
        }
    </script>
</body>
</html>
