<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Protocol | MONSTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff2e63; --a: #ffd700; --s: #00fff2; --b: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--b); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; touch-action: manipulation; }
        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.2; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-in-out; z-index: 10; padding: 15px; }
        .hidden { display: none !important; opacity: 0; }
        .glass { background: rgba(255,255,255,0.02); padding: 30px; border-radius: 35px; border: 1px solid rgba(255,46,99,0.2); backdrop-filter: blur(25px); text-align: center; width: 90%; max-width: 320px; box-shadow: 0 30px 60px rgba(0,0,0,1); }
        
        /* Keypad Styles */
        .display { background: #000; border-radius: 15px; padding: 15px; margin-bottom: 20px; font-size: 2rem; color: var(--s); letter-spacing: 5px; min-height: 45px; border: 1px solid #222; }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { padding: 18px; background: #111; border-radius: 18px; cursor: pointer; font-weight: bold; border: 1px solid #222; transition: 0.2s; font-size: 1.2rem; }
        .key:active { background: var(--s); color: #000; transform: scale(0.9); }

        /* Mystery Box */
        .gift-box { font-size: 100px; cursor: pointer; animation: boxBounce 0.8s infinite alternate; filter: drop-shadow(0 0 20px var(--p)); }
        @keyframes boxBounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Mega Countdown */
        .count-text { font-size: 8rem; font-weight: 900; color: #fff; text-shadow: 0 0 50px var(--p); animation: zoomIn 0.8s infinite; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1.5); opacity: 1; } }

        /* Jumping Name Text */
        .jumping-container { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .jump-char { font-size: 2.2rem; font-weight: 900; color: #fff; text-transform: lowercase; text-shadow: 0 0 15px var(--p); animation: jump 0.6s infinite alternate; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        /* Secret Letter */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fff; color: #000; padding: 25px; border-radius: 30px; width: 85%; max-width: 310px; max-height: 60vh; z-index: 100; transition: 0.5s; box-shadow: 0 0 100px rgba(255,46,99,0.5); display: flex; flex-direction: column; }
        .modal.open { transform: translate(-50%, -50%) scale(1); }
        .scroll-area { overflow-y: auto; text-align: left; font-family: 'Dancing Script', cursive; font-size: 1.3rem; line-height: 1.4; padding: 10px; }

        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn-p { background: var(--p); color: #000; padding: 14px 30px; border-radius: 50px; cursor: pointer; font-weight: 900; border: none; margin-top: 20px; box-shadow: 0 10px 20px rgba(255,46,99,0.3); }
        
        /* Balloons */
        .balloon { position: absolute; bottom: -100px; animation: floatUp 4s linear forwards; font-size: 40px; z-index: 5; }
        @keyframes floatUp { to { transform: translateY(-110vh) translateX(50px); opacity: 0; } }
    </style>
</head>
<body onclick="tapCelebration(event)">
    <canvas id="bg-canvas"></canvas>

    <div id="gen-screen" class="screen hidden">
        <div class="glass">
            <h2 style="color:var(--a); margin:0;">BIRTHDAY CREATOR</h2>
            <input type="text" id="nameInp" placeholder="Target Name">
            <input type="text" id="fromInp" placeholder="Your Name (From)">
            <textarea id="msgInp" placeholder="Secret Birthday Message..."></textarea>
            <button class="btn-p" onclick="createLink()" style="width:100%;">GENERATE MAGIC LINK</button>
        </div>
    </div>

    <div id="stage1" class="screen hidden">
        <div class="glass">
            <h2 style="color:var(--a); margin:0;">UNLOCK MAGIC</h2>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 15px;">YEAR (2000-2025)</p>
            <div id="display" class="display"></div>
            <div class="keys">
                <script>for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);</script>
                <div class="key" style="color:#ff2e63" onclick="backspace()">⌫</div>
                <div class="key" onclick="press(0)">0</div>
                <div class="key" style="background:var(--s); color:#000" onclick="verify()">OK</div>
            </div>
        </div>
    </div>

    <div id="stage-box" class="screen hidden">
        <div class="gift-box" onclick="startCountdown()">🎁</div>
        <p style="margin-top:20px; color:var(--s); font-weight:bold; letter-spacing:2px;">TAP THE BOX TO UNLOCK</p>
    </div>

    <div id="stage-count" class="screen hidden">
        <div id="countNumber" class="count-text">3</div>
    </div>

    <div id="stage-reveal" class="screen hidden">
        <div style="font-size: 60px; margin-bottom: 10px;">🎉</div>
        <div class="jumping-container" id="jumpingText"></div>
        <p id="fromTag" style="color:var(--s); letter-spacing:3px; font-size:0.8rem; margin-top:5px; text-transform:lowercase;"></p>
        <button class="btn-p" onclick="toggleMsg()">READ SECRET NOTE ✉️</button>
        
        <div id="msgModal" class="modal">
            <h3 style="color:var(--p); text-align:center; margin:0 0 10px 0;">Special Note 💖</h3>
            <div class="scroll-area"><p id="finalMsg"></p></div>
            <button onclick="toggleMsg()" style="margin-top:15px; background:#f5f5f5; border:none; padding:12px; border-radius:15px; width:100%; font-weight:bold;">Close</button>
        </div>
    </div>

    <script>
        let input = "";
        const params = new URLSearchParams(window.location.search);
        const u = params.get('u'), f = params.get('f'), x = params.get('x');

        window.onload = () => {
            if (u) document.getElementById('stage1').classList.remove('hidden');
            else document.getElementById('gen-screen').classList.remove('hidden');
        };

        function press(n) { if(input.length < 4) { input += n; updateDisplay(); } }
        function backspace() { input = input.slice(0, -1); updateDisplay(); }
        function updateDisplay() { document.getElementById('display').innerText = input; }

        function verify() {
            const y = parseInt(input);
            if (y >= 2000 && y <= 2025) {
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('stage-box').classList.remove('hidden');
            } else { alert("Access Denied! 2000-2025 Only"); input = ""; updateDisplay(); }
        }

        function startCountdown() {
            document.getElementById('stage-box').classList.add('hidden');
            document.getElementById('stage-count').classList.remove('hidden');
            let timer = 3;
            const interval = setInterval(() => {
                timer--;
                if(timer > 0) document.getElementById('countNumber').innerText = timer;
                else {
                    clearInterval(interval);
                    revealFinal();
                }
            }, 1000);
        }

        function revealFinal() {
            document.getElementById('stage-count').classList.add('hidden');
            document.getElementById('stage-reveal').classList.remove('hidden');
            
            // Setup Reveal
            const name = decodeURIComponent(u).toLowerCase();
            const fullText = "happy birthday " + name;
            const container = document.getElementById('jumpingText');
            fullText.split("").forEach((char, i) => {
                const span = document.createElement('span');
                span.innerText = char === " " ? "\u00A0" : char;
                span.className = "jump-char";
                span.style.animationDelay = (i * 0.1) + "s";
                container.appendChild(span);
            });

            if(f) document.getElementById('fromTag').innerText = "from: " + decodeURIComponent(f).toLowerCase();
            
            if(x) {
                const decoded = atob(x.split("").reverse().join(""));
                document.getElementById('finalMsg').innerText = decodeURIComponent(escape(decoded));
            }

            // Firecrackers & Balloons
            bigBlast();
            spawnBalloons();
        }

        function bigBlast() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ff2e63', '#ffd700', '#00fff2'] });
            let end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function spawnBalloons() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    b.innerText = ['🎈','🎈','💖','✨'][Math.floor(Math.random()*4)];
                    b.style.left = Math.random() * 100 + "vw";
                    document.body.appendChild(b);
                    setTimeout(() => b.remove(), 4000);
                }, i * 300);
            }
        }

        function toggleMsg() { document.getElementById('msgModal').classList.toggle('open'); }

        function tapCelebration(e) {
            if(document.getElementById('stage-reveal').classList.contains('hidden')) return;
            confetti({ particleCount: 20, startVelocity: 30, spread: 360, origin: { x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight } });
        }

        function createLink() {
            const n = document.getElementById('nameInp').value, frm = document.getElementById('fromInp').value, m = document.getElementById('msgInp').value;
            if(!n || !frm || !m) return alert("All fields required!");
            const secret = btoa(unescape(encodeURIComponent(m))).split("").reverse().join("");
            const link = `${window.location.origin}${window.location.pathname}?u=${encodeURIComponent(n)}&f=${encodeURIComponent(frm)}&x=${secret}`;
            navigator.clipboard.writeText(link).then(() => { alert("MAGIC LINK COPIED!"); window.location.href = link; });
        }

        // Bg Hearts Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let hearts = [];
        for(let i=0; i<25; i++) hearts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*0.4+0.2, sz: Math.random()*15+5});
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 46, 99, 0.15)";
            hearts.forEach(h => {
                ctx.font = h.sz+"px serif"; ctx.fillText('❤️', h.x, h.y);
                h.y -= h.s; if(h.y < -20) h.y = canvas.height+20;
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
