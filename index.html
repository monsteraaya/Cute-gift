<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Protocol | MONSTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff2e63; /* Neon Pink */
            --accent: #ffd700;  /* Gold */
            --bg: #050505;      /* Deep Black */
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Moving Heart Background */
        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.4; }

        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10; padding: 20px;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1) translateY(30px); }

        /* Premium Glass Box */
        .glass-box {
            background: var(--glass);
            padding: 35px 25px; border-radius: 30px;
            border: 1px solid rgba(255, 46, 99, 0.2);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            width: 100%; max-width: 320px;
        }

        h2 { font-size: 1.3rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 5px; }

        /* Keypad Styling */
        .display {
            background: #000; border-radius: 15px;
            padding: 15px; margin-bottom: 25px;
            font-size: 2.2rem; color: var(--primary);
            letter-spacing: 8px; min-height: 45px;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 15px rgba(255, 46, 99, 0.2);
        }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key {
            padding: 18px; background: #111;
            border-radius: 18px; cursor: pointer;
            font-weight: bold; font-size: 1.2rem;
            transition: 0.2s; border: 1px solid #222;
        }
        .key:active { transform: scale(0.9); background: var(--primary); color: #000; }

        /* Reveal Styling */
        .gift-icon { font-size: 80px; margin-bottom: 20px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .neon-name {
            font-size: 3.5rem; font-weight: 900; margin: 10px 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 3s linear infinite;
            text-shadow: 0 0 25px rgba(255, 46, 99, 0.5);
        }
        @keyframes shine { to { background-position: 200% auto; } }

        .msg-btn {
            background: none; border: 2px solid var(--primary); color: var(--primary);
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin-top: 30px; transition: 0.4s;
        }
        .msg-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        .letter-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; color: #000; padding: 30px; border-radius: 25px;
            width: 80%; max-width: 300px; z-index: 100; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; box-shadow: 0 0 100px rgba(255,46,99,0.5);
        }
        .letter-modal.open { transform: translate(-50%, -50%) scale(1); }

        /* Setup Screen */
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #333;
            background: #000; color: white; box-sizing: border-box;
        }

        .watermark { position: fixed; bottom: 15px; right: 15px; color: var(--primary); font-size: 10px; font-weight: bold; opacity: 0.6; letter-spacing: 2px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="watermark">DEV: MONSTER</div>

    <div id="stage1" class="screen">
        <div class="glass-box">
            <h2>BIRTHDAY LOCK</h2>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 20px;">ENTER BIRTH YEAR (2000 - 2025)</p>
            <div id="display" class="display"></div>
            <div class="keys">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);
                </script>
                <div class="key" style="color:#555" onclick="clr()">C</div>
                <div class="key" onclick="press(0)">0</div>
                <div class="key" style="background:var(--primary); color:black;" onclick="verify()">OK</div>
            </div>
        </div>
    </div>

    <div id="stage2" class="screen hidden">
        <div class="gift-icon">🎁</div>
        <p style="color: var(--accent); letter-spacing: 5px; font-weight: bold; margin: 0;">HAPPY BIRTHDAY</p>
        <h1 id="targetName" class="neon-name"></h1>
        <button class="msg-btn" onclick="toggleLetter()">OPEN SECRET MESSAGE ✉️</button>
        
        <div id="letter" class="letter-modal" onclick="toggleLetter()">
            <h3 style="color: var(--primary); margin-top: 0;">A Little Note 💖</h3>
            <p id="finalMsg" style="line-height: 1.6; font-size: 0.95rem;"></p>
            <p style="font-size: 10px; color: #999; margin-top: 20px;">(Tap to close)</p>
        </div>
    </div>

    <div id="setup" class="screen hidden">
        <div class="glass-box">
            <h3 style="margin-top: 0;">Setup Surprise</h3>
            <input type="text" id="nameInp" placeholder="Friend's Name">
            <textarea id="msgInp" placeholder="Your Secret Message..." style="height: 80px;"></textarea>
            <button onclick="genLink()" style="width:100%; background:var(--primary); color:black; padding:15px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:10px;">COPY MAGIC LINK</button>
        </div>
    </div>

    <script>
        let input = "";
        const params = new URLSearchParams(window.location.search);
        const u = params.get('u'); // Name
        const x = params.get('x'); // Masked Message

        window.onload = () => {
            if (!u) {
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('setup').classList.remove('hidden');
            }
        };

        function press(n) { if(input.length < 4) { input += n; document.getElementById('display').innerText = input; } }
        function clr() { input = ""; document.getElementById('display').innerText = ""; }

        function verify() {
            const year = parseInt(input);
            if (year >= 2000 && year <= 2025) {
                unlock();
            } else {
                alert("❌ ACCESS DENIED\nEnter a year between 2000 and 2025!");
                clr();
            }
        }

        function unlock() {
            document.getElementById('stage1').classList.add('hidden');
            document.getElementById('stage2').classList.remove('hidden');
            document.getElementById('targetName').innerText = decodeURIComponent(u);
            
            if(x) {
                // Secret Reveal: Reverse + Base64 Decode
                const decoded = atob(x.split("").reverse().join(""));
                document.getElementById('finalMsg').innerText = decodeURIComponent(escape(decoded));
            }

            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            setInterval(() => {
                confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2e63'] });
                confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffd700'] });
            }, 3000);
        }

        function toggleLetter() { document.getElementById('letter').classList.toggle('open'); }

        function genLink() {
            const name = document.getElementById('nameInp').value;
            const msg = document.getElementById('msgInp').value;
            if(!name || !msg) return alert("Details bhariye!");

            // Ultra Masking: Encode + Reverse
            const secret = btoa(unescape(encodeURIComponent(msg))).split("").reverse().join("");
            const link = `${window.location.origin}${window.location.pathname}?u=${encodeURIComponent(name)}&x=${secret}`;
            
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ LINK COPIED!\nAb message link mein hide ho chuka hai.");
                window.location.href = link;
            });
        }

        // Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let hearts = [];
        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speed = Math.random() * 1 + 0.5;
            }
            draw() {
                ctx.fillStyle = "rgba(255, 46, 99, 0.3)";
                ctx.font = `${this.size}px serif`;
                ctx.fillText('❤️', this.x, this.y);
            }
            update() {
                this.y -= this.speed;
                if (this.y < -20) this.y = canvas.height + 20;
            }
        }
        for(let i=0; i<40; i++) hearts.push(new Heart());
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
