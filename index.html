<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Magic | MONSTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        /* CSS & THEME SETTINGS */
        :root {
            --bg: #050505; /* Deep Black */
            --primary: #ff2e63; /* Neon Pink */
            --secondary: #ffd700; /* Liquid Gold */
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Background Heart Particles */
        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10; padding: 20px;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1) translateY(30px); }

        /* Premium Glassmorphism Box */
        .glass-box {
            background: var(--glass);
            padding: 35px 25px; border-radius: 30px;
            border: 1px solid rgba(255, 46, 99, 0.2);
            backdrop-filter: blur(25px);
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            width: 100%; max-width: 320px;
        }

        h2 { font-size: 1.5rem; letter-spacing: 2px; color: var(--secondary); margin-bottom: 5px; text-transform: uppercase; }
        .hint { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 25px; }

        /* Keypad Styling */
        .display {
            background: #000; border-radius: 15px;
            padding: 18px; margin-bottom: 25px;
            font-size: 2.2rem; color: var(--primary);
            letter-spacing: 8px; min-height: 45px;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 15px rgba(255, 46, 99, 0.2);
        }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .key {
            padding: 20px; background: #111;
            border-radius: 18px; cursor: pointer;
            font-weight: bold; font-size: 1.2rem;
            transition: 0.3s; border: 1px solid #222;
        }
        .key:active { transform: scale(0.9); background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        /* Surprise Section Styling */
        .gift-icon { font-size: 90px; margin-bottom: 30px; animation: pulse 1s infinite alternate; filter: drop-shadow(0 0 20px var(--primary)); }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        .neon-name {
            font-size: 3.8rem; font-weight: 900; margin: 15px 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff 20%, var(--primary) 50%, #fff 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 3s linear infinite;
            text-shadow: 0 0 30px rgba(255, 46, 99, 0.6);
        }
        @keyframes shine { to { background-position: 200% auto; } }

        .bday-text { font-size: 1.1rem; letter-spacing: 4px; color: var(--secondary); font-weight: bold; margin-bottom: 40px; }

        /* Secret Message Button & Content */
        .message-btn {
            background: none; border: 2px solid var(--primary); color: var(--primary);
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 0.9rem; letter-spacing: 1px;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .message-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        .letter-content {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; color: #000; padding: 35px; border-radius: 25px;
            width: 85%; max-width: 320px; z-index: 100; transition: 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            text-align: center; box-shadow: 0 0 100px rgba(255,46,99,0.4);
        }
        .letter-content.open { transform: translate(-50%, -50%) scale(1); }
        .letter-content h3 { color: var(--primary); margin-top: 0; }

        /* Setup Screen Inputs */
        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #333;
            background: #000; color: white; box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }

        /* Watermark */
        .watermark { position: fixed; bottom: 15px; right: 15px; color: var(--primary); font-size: 10px; font-weight: bold; opacity: 0.6; letter-spacing: 2px; z-index: 1000; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div class="watermark">DESIGNED BY MONSTER</div>

    <div id="stage1" class="screen">
        <div class="glass-box">
            <h2>ACCESS PROTOCOL</h2>
            <p class="hint">Enter Birth Year (2000 - 2025)</p>
            <div id="display" class="display"></div>
            <div class="keys">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);
                </script>
                <div class="key" style="background:#222; color:#888;" onclick="clr()">C</div>
                <div class="key" onclick="press(0)">0</div>
                <div class="key" style="background:var(--primary); color:black;" onclick="verify()">OK</div>
            </div>
        </div>
    </div>

    <div id="stage2" class="screen hidden">
        <div class="gift-icon">🎁</div>
        <p class="bday-text">IT'S YOUR DAY!</p>
        <h1 id="targetName" class="neon-name"></h1>
        
        <button class="message-btn" onclick="toggleLetter()">VIEW MY MESSAGE ✉️</button>
        
        <div id="letter" class="letter-content" onclick="toggleLetter()">
            <h3>Special Note 💌</h3>
            <p id="personalMsg">May this day bring you endless joy, love, and laughter. You deserve the best! ✨</p>
            <p style="font-size: 11px; color: #888; margin-top:20px;">(Tap to close)</p>
        </div>
    </div>

    <div id="setup" class="screen hidden">
        <div class="glass-box">
            <h2 style="color:white; margin-bottom:15px;">Setup Surprise</h2>
            <input type="text" id="nameInp" placeholder="Friend's Name..." spellcheck="false">
            <textarea id="msgInp" placeholder="Your Birthday Message..." spellcheck="false" style="height: 80px;"></textarea>
            <button onclick="genLink()" style="width:100%; background:var(--primary); color:black; padding:15px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:10px;">Copy Magic Link</button>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC

        // 1. Particle Background Logic
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let hearts = [];
        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 10 + 5;
                this.speedY = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < -20) this.y = canvas.height + 20;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 46, 99, ${this.opacity})`;
                ctx.font = `${this.size}px serif`;
                ctx.fillText('❤️', this.x, this.y);
            }
        }
        function initBg() { for (let i = 0; i < 50; i++) hearts.push(new Heart()); }
        function animateBg() { ctx.clearRect(0, 0, canvas.width, canvas.height); hearts.forEach(h => { h.update(); h.draw(); }); requestAnimationFrame(animateBg); }
        initBg(); animateBg();

        // 2. Birthday Logic
        let input = "";
        const params = new URLSearchParams(window.location.search);
        const uName = params.get('u');
        const uMsg = params.get('m');

        window.onload = () => {
            if (!uName) {
                // Show Setup if no user data
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('setup').classList.remove('hidden');
            }
        };

        function press(n) { if(input.length < 4) { input += n; document.getElementById('display').innerText = input; } }
        function clr() { input = ""; document.getElementById('display').innerText = ""; }

        function verify() {
            const year = parseInt(input);
            // Universal Unlock for 2000-2025
            if (year >= 2000 && year <= 2025) { unlock(); } 
            else { alert("Incorrect! Try birth year (2000-2025)"); clr(); }
        }

        function unlock() {
            document.getElementById('stage1').classList.add('hidden');
            document.getElementById('stage2').classList.remove('hidden');
            document.getElementById('targetName').innerText = decodeURIComponent(uName);
            if(uMsg) document.getElementById('personalMsg').innerText = decodeURIComponent(uMsg);
            
            // Full Screen Confetti
            confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 }, colors: ['#ff2e63', '#ffd700', '#ffffff'] });
            
            // Continuous side confetti
            setInterval(() => {
                confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2e63'] });
                confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffd700'] });
            }, 2500);
        }

        function toggleLetter() { document.getElementById('letter').classList.toggle('open'); }

        function genLink() {
            const n = document.getElementById('nameInp').value;
            const m = document.getElementById('msgInp').value;
            if (!n) return alert("Please enter a name!");
            const link = `${window.location.origin}${window.location.pathname}?u=${encodeURIComponent(n)}&m=${encodeURIComponent(m)}`;
            navigator.clipboard.writeText(link).then(() => {
                alert("Magic Link Copied! \nPasscode: Their Birth Year (2000-2025)");
                window.location.href = link; // Preview
            });
        }
    </script>
</body>
</html>
