<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Protocol | MONSTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2e63; /* Neon Pink */
            --accent: #ffd700;  /* Gold */
            --bg: #050505;      /* Deep Black */
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Moving Heart Background */
        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10; padding: 20px;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1) translateY(30px); }

        /* Premium Glass Box */
        .glass-box {
            background: var(--glass);
            padding: 35px 25px; border-radius: 30px;
            border: 1px solid rgba(255, 46, 99, 0.2);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            width: 100%; max-width: 320px;
        }

        h2 { font-size: 1.3rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }

        /* Keypad Styling */
        .display {
            background: #000; border-radius: 15px;
            padding: 15px; margin-bottom: 25px;
            font-size: 2.2rem; color: var(--primary);
            letter-spacing: 8px; min-height: 45px;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 15px rgba(255, 46, 99, 0.2);
        }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key {
            padding: 18px; background: #111;
            border-radius: 18px; cursor: pointer;
            font-weight: bold; font-size: 1.2rem;
            transition: 0.2s; border: 1px solid #222;
        }
        .key:active { transform: scale(0.9); background: var(--primary); color: #000; }

        /* Surprise Section Styling */
        .gift-icon { font-size: 90px; margin-bottom: 30px; animation: pulse 1s infinite alternate; filter: drop-shadow(0 0 20px var(--primary)); }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .neon-name {
            font-size: 3.5rem; font-weight: 900; margin: 10px 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 3s linear infinite;
            text-shadow: 0 0 25px rgba(255, 46, 99, 0.5);
            word-wrap: break-word; text-align: center;
        }
        @keyframes shine { to { background-position: 200% auto; } }

        .bday-text { font-size: 1rem; letter-spacing: 4px; color: var(--accent); font-weight: bold; margin-bottom: 40px; text-transform: uppercase; }

        /* Secret Message Button */
        .msg-btn {
            background: none; border: 2px solid var(--primary); color: var(--primary);
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 0.9rem; letter-spacing: 1px;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .msg-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        /* Scrollable Message Modal */
        .letter-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; color: #000; padding: 30px; border-radius: 25px;
            width: 85%; max-width: 300px;
            max-height: 70vh; /* Limits height to fit screen */
            z-index: 100; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(255,46,99,0.5);
        }
        .letter-modal.open { transform: translate(-50%, -50%) scale(1); }
        .letter-modal h3 { color: var(--primary); margin-top: 0; font-family: 'Poppins', sans-serif; text-align: center;}
        
        .modal-scroll-content {
            overflow-y: auto; /* Enables scrolling */
            text-align: left;
            font-family: 'Dancing Script', cursive; font-size: 1.3rem; line-height: 1.4;
            padding-right: 5px; /* for scrollbar spacing */
        }
        /* Custom scrollbar */
        .modal-scroll-content::-webkit-scrollbar { width: 5px; }
        .modal-scroll-content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        /* Setup Screen Inputs */
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #333;
            background: #000; color: white; box-sizing: border-box;
            font-family: inherit; font-size: 0.9rem;
        }
        textarea { height: 80px; resize: none; }

        /* Countdown Visual */
        .countdown-visual { font-size: 8rem; font-weight: 900; color: #fff; text-shadow: 0 0 50px var(--primary); animation: countdownPop 0.8s infinite;}
        @keyframes countdownPop { 0% { transform: scale(0.5); opacity: 0;} 50% {transform: scale(1.1); opacity: 1;} 100% {transform: scale(1); opacity: 1;}}

        /* Watermark */
        .watermark { position: fixed; bottom: 15px; right: 15px; color: var(--primary); font-size: 10px; font-weight: bold; opacity: 0.6; letter-spacing: 2px; z-index: 1000; }
    </style>
</head>
<body onclick="tapCelebration(event)">

    <canvas id="bg-canvas"></canvas>
    <div class="watermark">DEV: MONSTER</div>

    <div id="stage1" class="screen">
        <div class="glass-box">
            <h2>SURPRISE LOCK</h2>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 20px;">ENTER BIRTH YEAR (2000-2025)</p>
            <div id="display" class="display"></div>
            <div class="keys">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);
                </script>
                <div class="key" style="background:#222; color:#888;" onclick="clr()">C</div>
                <div class="key" onclick="press(0)">0</div>
                <div class="key" style="background:var(--primary); color:black;" onclick="verify()">OK</div>
            </div>
        </div>
    </div>

    <div id="stage-box" class="screen hidden">
        <div class="gift-icon" onclick="startCountdownSequence()">🎁</div>
        <p style="margin-top:20px; color:var(--accent); font-weight:bold; letter-spacing:2px;">TAP TO UNLOCK GIFT</p>
    </div>

    <div id="stage-countdown" class="screen hidden">
        <div id="countdown-visual" class="countdown-visual">3</div>
    </div>

    <div id="stage-reveal" class="screen hidden">
        <div style="font-size: 80px;">🎁</div>
        <p class="bday-text">HAPPY BIRTHDAY!</p>
        <h1 id="targetName" class="neon-name"></h1>
        
        <button class="msg-btn" onclick="toggleLetter()">VIEW MY MESSAGE ✉️</button>
        
        <div id="letter" class="letter-modal">
            <h3>Special Note 💌</h3>
            <div class="modal-scroll-content">
                <p id="personalMsg"></p>
            </div>
            <button onclick="toggleLetter()" style="margin-top:20px; background:#f5f5f5; border:none; padding:10px; border-radius:10px; width:100%; cursor:pointer; font-weight:bold;">Close</button>
        </div>
    </div>

    <div id="setup" class="screen hidden">
        <div class="glass-box">
            <h2 style="color:white; margin-bottom:15px;">Setup Surprise</h2>
            <input type="text" id="nameInp" placeholder="Friend's Name" spellcheck="false">
            <textarea id="msgInp" placeholder="Type long message here... (scrolling is enabled)" spellcheck="false"></textarea>
            <button onclick="genLink()" style="width:100%; background:var(--primary); color:black; padding:15px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:10px;">Copy Magic Link</button>
        </div>
    </div>

    <script>
        // BACKGROUND ANIMATION
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let hearts = [];
        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speed = Math.random() * 1 + 0.5;
            }
            draw() {
                ctx.fillStyle = "rgba(255, 46, 99, 0.3)";
                ctx.font = `${this.size}px serif`;
                ctx.fillText('❤️', this.x, this.y);
            }
            update() {
                this.y -= this.speed;
                if (this.y < -20) this.y = canvas.height + 20;
            }
        }
        for(let i=0; i<40; i++) hearts.push(new Heart());
        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // LOGIC
        let input = "";
        const params = new URLSearchParams(window.location.search);
        const u = params.get('u'), x = params.get('x');

        window.onload = () => {
            if (!u) {
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('setup').classList.remove('hidden');
            }
        };

        function press(n) { if(input.length < 4) { input += n; document.getElementById('display').innerText = input; } }
        function clr() { input = ""; document.getElementById('display').innerText = ""; }

        function verify() {
            const year = parseInt(input);
            if (year >= 2000 && year <= 2025) unlockMysteryBox();
            else { alert("Incorrect! Try birth year (2000-2025)"); clr(); }
        }

        function unlockMysteryBox() {
            document.getElementById('stage1').classList.add('hidden');
            document.getElementById('stage-box').classList.remove('hidden');
        }

        function startCountdownSequence() {
            document.getElementById('stage-box').classList.add('hidden');
            document.getElementById('stage-countdown').classList.remove('hidden');
            let timer = 3;
            const interval = setInterval(() => {
                timer--;
                if(timer > 0) document.getElementById('countdown-visual').innerText = timer;
                else { clearInterval(interval); revealFinal(); }
            }, 1000);
        }

        function revealFinal() {
            document.getElementById('stage-countdown').classList.add('hidden');
            document.getElementById('stage-reveal').classList.remove('hidden');
            document.getElementById('targetName').innerText = decodeURIComponent(u);
            
            if(x) {
                // Secure Decoding
                const decoded = atob(x.split("").reverse().join(""));
                document.getElementById('personalMsg').innerText = decodeURIComponent(escape(decoded));
            }

            confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 }, colors: ['#ff2e63', '#ffd700', '#ffffff'] });
            setInterval(() => {
                confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2e63'] });
                confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffd700'] });
            }, 3000);
        }

        function toggleLetter() { document.getElementById('letter').classList.toggle('open'); }

        function tapCelebration(e) {
            if(document.getElementById('stage-reveal').classList.contains('hidden')) return;
            confetti({ particleCount: 15, startVelocity: 30, spread: 360, origin: { x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight } });
        }

        function genLink() {
            const name = document.getElementById('nameInp').value;
            const msg = document.getElementById('msgInp').value;
            if(!name || !msg) return alert("Pehle naam aur message dalo!");
            // Ultra Masking: Encode + Reverse
            const secret = btoa(unescape(encodeURIComponent(msg))).split("").reverse().join("");
            const link = `${window.location.origin}${window.location.pathname}?u=${encodeURIComponent(name)}&x=${secret}`;
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ MAGIC LINK COPIED!\nPasscode: Their Birth Year (2000-2025)");
                window.location.href = link;
            });
        }
    </script>
</body>
</html>
